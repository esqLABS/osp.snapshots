url: https://esqlabs.github.io/osp.snapshots/

template:
  bootstrap: 5

development:
  mode: auto

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [search, github]
  components:
    reference:
      text: "Reference"
      href: reference/index.html
    articles:
      text: "Articles"
      menu:
      - text: "Working with Data Frames" 
        href: articles/working-with-dataframes.html
      - text: "Creating Building Blocks"
        href: articles/creating-building-blocks.html

home:
  title: "osp.snapshots"
  description: >
    Import and manipulate Open Systems Pharmacology project snapshots in R.
    Convert complex JSON structures to accessible R objects and data frames.
  strip_header: true

articles:
- title: "Guides"
  desc: "In-depth guides for specific tasks"
  contents:
  - working-with-dataframes
  - creating-building-blocks

reference:

- title: "Import and export"
  desc: "Load snapshots and export modifications"
  contents:
  - load_snapshot
  - export_snapshot
  - osp_models

- title: "Building blocks"
  desc: "R6 classes wrapping the eight PK-Sim building block kinds and the root snapshot"
  contents:
  - Snapshot
  - Compound
  - Event
  - ExpressionProfile
  - Formulation
  - Individual
  - ObserverSet
  - Population
  - Protocol

- title: "Leaf and sub-structure types"
  desc: "Reusable R6 leaf classes and sub-structures held inside building blocks"
  contents:
  - AdvancedParameter
  - CalculationMethodCache
  - LocalizedParameter
  - Observer
  - OriginData
  - Parameter
  - Process
  - Schema
  - SchemaItem
  - range
  - Range-class

- title: "Factories"
  desc: "Construct building blocks and leaves from named arguments"
  contents:
  - create_compound
  - create_event
  - create_expression_profile
  - create_formulation
  - create_individual
  - create_observed_data
  - create_observer_set
  - create_parameter
  - create_population
  - create_process
  - create_protocol
  - create_schema
  - create_schema_item

- title: "Mutators"
  desc: "Add and remove building blocks on a snapshot"
  contents:
  - add_compound
  - add_event
  - add_expression_profile
  - add_formulation
  - add_individual
  - add_observed_data
  - add_observer_set
  - add_population
  - add_protocol
  - remove_compound
  - remove_event
  - remove_expression_profile
  - remove_formulation
  - remove_individual
  - remove_observed_data
  - remove_observer_set
  - remove_population
  - remove_protocol

- title: "Tibble exporters"
  desc: "Convert building blocks to tibbles for analysis"
  contents:
  - as_tibbles
  - get_compounds_dfs
  - get_events_dfs
  - get_expression_profiles_dfs
  - get_formulations_dfs
  - get_individuals_dfs
  - get_observed_data_dfs
  - get_observer_sets_dfs
  - get_populations_dfs
  - get_protocols_dfs

- title: "Observed data"
  desc: "Bridge between PK-Sim observed data and ospsuite"
  contents:
  - loadDataSetFromSnapshot

- title: "Validators and utilities"
  desc: "Helpers for validation and data conversion"
  contents:
  - validate_snapshot
  - validate_species
  - validate_population
  - validate_gender
  - validate_unit
  - convert_ospsuite_time_unit_to_lubridate
  - convert_ospsuite_time_to_duration

- title: "Print methods"
  desc: "Formatted display methods for building block collections"
  contents:
  - starts_with("print.")

footer:
  structure:
    left: [developed_by, built_with]
    right: [package]
  components:
    package: "osp.snapshots"
