url: https://esqlabs.github.io/osp.snapshots/

template:
  bootstrap: 5

development:
  mode: auto

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [search, github]
  components:
    reference:
      text: "Reference"
      href: reference/index.html
    articles:
      text: "Articles"
      menu:
      - text: "Creating and managing building blocks"
        href: articles/creating-building-blocks.html
      - text: "Building simulations from scratch"
        href: articles/simulations.html
      - text: "Exporting snapshots to data frames"
        href: articles/exporting-snapshots-to-dataframes.html

home:
  title: "osp.snapshots"
  description: >
    Import and manipulate Open Systems Pharmacology project snapshots in R.
    Convert complex JSON structures to accessible R objects and data frames.
  strip_header: true

articles:
- title: "Guides"
  desc: "In-depth guides for specific tasks"
  contents:
  - osp-snapshots
  - creating-building-blocks
  - simulations
  - exporting-snapshots-to-dataframes

reference:

- title: "Import and export"
  desc: "Load snapshots and export modifications"
  contents:
  - load_snapshot
  - export_snapshot
  - create_snapshot
  - osp_models

- title: "Building blocks"
  desc: "R6 classes wrapping the PK-Sim building blocks and the root snapshot"
  contents:
  - Snapshot
  - Compound
  - Event
  - ExpressionProfile
  - Formulation
  - Individual
  - ObserverSet
  - Population
  - Protocol
  - Simulation

- title: "Leaf and sub-structure types"
  desc: "Reusable R6 leaf classes and sub-structures held inside building blocks"
  contents:
  - AdvancedParameter
  - CalculationMethods
  - CompoundGroupSelection
  - CompoundProcessSelection
  - CompoundProperties
  - EventSelection
  - FormulationSelection
  - LocalizedParameter
  - Observer
  - ObserverSetSelection
  - OriginData
  - OutputInterval
  - OutputMapping
  - OutputSchema
  - Parameter
  - Process
  - ProtocolSelection
  - Schema
  - SchemaItem
  - SolverSettings
  - range
  - Range-class

- title: "Factories"
  desc: "Construct building blocks and leaves from named arguments"
  contents:
  - create_compound
  - create_compound_group_selection
  - create_compound_process_selection
  - create_compound_properties
  - create_descriptor_condition
  - create_event
  - create_event_selection
  - create_expression_profile
  - create_formula_reference
  - create_formulation
  - create_formulation_selection
  - create_individual
  - create_molecule_list
  - create_observed_data
  - create_observer
  - create_observer_set
  - create_observer_set_selection
  - create_output_interval
  - create_output_mapping
  - create_output_schema
  - create_parameter
  - create_population
  - create_process
  - create_protocol
  - create_protocol_selection
  - create_schema
  - create_schema_item
  - create_solver_settings

- title: "Value-object helpers"
  desc: "Bundle a value, unit, and field-specific extras for the create_* factory arguments"
  contents:
  - lipophilicity
  - fraction_unbound
  - solubility
  - intestinal_permeability
  - permeability
  - age
  - weight
  - height
  - gestational_age
  - time
  - values
  - error

- title: "Mutators"
  desc: "Add and remove building blocks on a snapshot"
  contents:
  - add_compound
  - add_event
  - add_expression_profile
  - add_formulation
  - add_individual
  - add_observed_data
  - add_observer_set
  - add_population
  - add_protocol
  - add_simulation
  - remove_compound
  - remove_event
  - remove_expression_profile
  - remove_formulation
  - remove_individual
  - remove_observed_data
  - remove_observer_set
  - remove_population
  - remove_protocol
  - remove_simulation

- title: "Tibble exporters"
  desc: "Convert building blocks to tibbles for analysis"
  contents:
  - as_tibbles
  - get_compounds_dfs
  - get_events_dfs
  - get_expression_profiles_dfs
  - get_formulations_dfs
  - get_individuals_dfs
  - get_observed_data_dfs
  - get_observer_sets_dfs
  - get_populations_dfs
  - get_protocols_dfs

- title: "Observed data"
  desc: "Bridge between PK-Sim observed data and ospsuite"
  contents:
  - loadDataSetFromSnapshot

- title: "Validators and utilities"
  desc: "Helpers for validation and data conversion"
  contents:
  - validate_snapshot
  - validate_species
  - validate_population
  - validate_gender
  - validate_unit
  - convert_ospsuite_time_unit_to_lubridate
  - convert_ospsuite_time_to_duration

- title: "Print methods"
  desc: "Formatted display methods for building block collections"
  contents:
  - starts_with("print.")

footer:
  structure:
    left: [developed_by, built_with]
    right: [package]
  components:
    package: "osp.snapshots"
